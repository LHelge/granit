name: Debug token
on: workflow_dispatch

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Probe release creation for both tag names
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for tag in v0.4.0 probe-fresh-name; do
            echo "--- create draft tag_name=$tag ---"
            if id=$(gh api -X POST "repos/$GITHUB_REPOSITORY/releases" -f tag_name="$tag" -F draft=true --jq .id 2>&1); then
              echo "CREATE OK ($tag) id=$id"
              gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/$id" && echo "cleaned"
            else
              echo "CREATE FAILED ($tag): $id"
            fi
          done
