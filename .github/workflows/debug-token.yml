name: Debug token
on: workflow_dispatch

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Probe release API with GITHUB_TOKEN
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "--- list releases (incl. drafts) ---"
          gh api "repos/$GITHUB_REPOSITORY/releases" --jq '.[] | "\(.tag_name) draft=\(.draft)"' || echo "LIST FAILED"
          echo "--- create draft release ---"
          gh api -X POST "repos/$GITHUB_REPOSITORY/releases" -f tag_name=debug-token-test -F draft=true --jq .id > /tmp/rid && echo "CREATE OK id=$(cat /tmp/rid)" || echo "CREATE FAILED"
          echo "--- cleanup ---"
          [ -s /tmp/rid ] && gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/$(cat /tmp/rid)" && echo "cleanup done" || true
