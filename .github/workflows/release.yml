name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  check:
    uses: ./.github/workflows/ci.yml

  # The changelog must exist before the build: tauri-action bakes the
  # release body into the updater manifest (latest.json "notes"), which is
  # what the app shows as release notes after an automatic update.
  changelog:
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.changelog.outputs.body }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate changelog
        id: changelog
        run: |
          git-cliff --latest --strip header -o CHANGELOG_RELEASE.md
          {
            echo 'body<<CHANGELOG_EOF'
            cat CHANGELOG_RELEASE.md
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

  build:
    needs: [check, changelog]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: ubuntu-latest
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # The linuxdeploy build tauri pins predates the excludelist entries for
      # libwayland, so the AppImage ships Ubuntu's libwayland-* and the host
      # EGL stack dlopens them, aborting with EGL_BAD_PARAMETER on rolling
      # distros (Arch/Hyprland reproduced). tauri-bundler only downloads
      # linuxdeploy-plugin-gtk.sh when it is absent from its tool cache, so we
      # pre-seed a patched copy that strips libwayland from the AppDir before
      # packaging and signing. Drop this once tauri updates its linuxdeploy.
      - name: Patch AppImage gtk plugin to exclude libwayland
        if: matrix.platform == 'ubuntu-latest'
        run: |
          mkdir -p ~/.cache/tauri
          curl -fsSL https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh -o ~/.cache/tauri/linuxdeploy-plugin-gtk.sh
          cat >> ~/.cache/tauri/linuxdeploy-plugin-gtk.sh <<'PATCH'

          # granit patch: never ship libwayland — bundled copies break host EGL
          # display creation (EGL_BAD_PARAMETER) on hosts newer than the runner.
          echo "granit patch: removing bundled libwayland from AppDir"
          rm -f "$APPDIR"/usr/lib/libwayland-*.so*
          PATCH
          chmod +x ~/.cache/tauri/linuxdeploy-plugin-gtk.sh

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,wasm32-unknown-unknown' || 'wasm32-unknown-unknown' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install trunk
        uses: taiki-e/install-action@trunk

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Import Apple Developer Certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Verify certificate
        if: matrix.platform == 'macos-latest'
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "CERT_ID=$CERT_ID" >> $GITHUB_ENV
          echo "Certificate imported."

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-latest' && env.CERT_ID || '' }}
          APPLE_ID: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Granit v__VERSION__'
          releaseBody: ${{ needs.changelog.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # Un-draft the release; the body was already set from the changelog job.
  # The updater endpoint (releases/latest/download/latest.json) only
  # resolves for published releases, so this is what makes the update
  # visible to running apps.
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit "${{ github.ref_name }}" --draft=false

  # Update the Homebrew tap (LHelge/homebrew-tap) cask to point at the
  # release just published: download the macOS dmg, compute its sha256,
  # regenerate Casks/granit.rb, and commit/push to the tap. A tap failure
  # must never fail the release, hence continue-on-error.
  bump-cask:
    needs: publish
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Download release dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${{ github.ref_name }}" --repo ${{ github.repository }} --pattern '*_aarch64.dmg'

      - name: Compute sha256
        id: sha
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          SHA=$(sha256sum "Granit_${VERSION}_aarch64.dmg" | cut -d' ' -f1)
          {
            echo "version=$VERSION"
            echo "sha=$SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Check out tap
        uses: actions/checkout@v6
        with:
          repository: LHelge/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Regenerate cask
        env:
          VERSION: ${{ steps.sha.outputs.version }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          cat > homebrew-tap/Casks/granit.rb <<EOF
          cask "granit" do
            version "$VERSION"
            sha256 "$SHA"

            url "https://github.com/LHelge/granit/releases/download/v#{version}/Granit_#{version}_aarch64.dmg",
                verified: "github.com/LHelge/granit/"
            name "Granit"
            desc "Minimal desktop note-taking app"
            homepage "https://granit.lhelge.se/"

            depends_on arch: :arm64

            auto_updates true

            app "Granit.app"

            zap trash: [
              "~/Library/Application Support/se.lhelge.granit",
              "~/Library/Caches/se.lhelge.granit",
              "~/Library/Saved Application State/se.lhelge.granit.savedState",
              "~/Library/WebKit/se.lhelge.granit",
            ]
          end
          EOF

      - name: Commit and push
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.sha.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/granit.rb
          git diff --cached --quiet || git commit -m "granit $VERSION"
          git push
