name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '.bears/**'
  workflow_dispatch:
  workflow_call:

jobs:
  ci:
    name: Check (fmt, clippy, test)
    # Needs glibc >= 2.38: the onnxruntime binary pulled in via
    # fastembed -> ort references __isoc23_strtol* symbols absent from
    # older glibc, so linking the test binary failed on ubuntu-22.04.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (backend)
        run: cargo clippy -p granit --all-targets -- -D warnings

      - name: Clippy (frontend)
        run: cargo clippy -p granit-ui --target wasm32-unknown-unknown -- -D warnings

      - name: Run tests
        run: cargo test -p granit

      # The rustwasm.github.io installer serves a stale version (the project
      # moved to the drager org); install-action tracks the latest release.
      - name: Install wasm-pack
        uses: taiki-e/install-action@wasm-pack

      - name: Run frontend WASM tests
        run: wasm-pack test --headless --firefox
