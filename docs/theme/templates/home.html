{% extends "base.html" %}

{% block page_title %}{{ site_title }}{% endblock page_title %}

{% block content %}
<section class="hero">
    <img src="/static/logo.png" alt="" class="hero-logo" width="96" height="96">
    <h1>{{ site_title }}</h1>
    {% if site_description %}
    <p class="hero-tagline">{{ site_description }}</p>
    {% endif %}
    <div class="cta-row">
        <a href="/download/" class="btn btn-primary">Download</a>
        <a href="/wiki/" class="btn btn-ghost">Read the docs</a>
    </div>
</section>

{% if home %}
<div class="home-body">
    {{ home.content | safe }}
</div>
{% endif %}
{% endblock content %}
