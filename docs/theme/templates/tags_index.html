{% extends "base.html" %}

{% block page_title %}Tags{% endblock page_title %}

{% block content %}
<div class="prose">
    <h1>Tags</h1>
    <ul class="tag-list tags-index-list">
        {% for entry in tags %}
        <li><a href="/tags/{{ entry.slug }}/">{{ entry.name }} · {{ entry.count }}</a></li>
        {% endfor %}
    </ul>
</div>
{% endblock content %}
